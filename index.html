<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hair Studio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#111;
  color:white;
}

header{
  background:black;
  padding:20px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 10px;
}

.hero{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
  url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=1200') center/cover;
}

.hero h1{
  font-size:50px;
}

.hero button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

.services{
  padding:40px;
  text-align:center;
}

.box{
  background:#222;
  padding:20px;
  margin:10px auto;
  max-width:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>Glow Hair</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Styles</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Fresh Haircuts</h1>
  <p>Look clean. Feel confident.</p>
  <button onclick="showMsg()">Book Now</button>
</section>

<section class="services">
  <h2>Our Services</h2>

  <div class="box">
    <h3>Haircut</h3>
    <p>Clean modern styles.</p>
  </div>

  <div class="box">
    <h3>Dreads</h3>
    <p>Retwist and styling.</p>
  </div>

  <div class="box">
    <h3>Coloring</h3>
    <p>Professional hair coloring.</p>
  </div>
</section>

<script>
function showMsg(){
  alert("Booking Coming Soon!");
}
</script>

</body>
</html>
